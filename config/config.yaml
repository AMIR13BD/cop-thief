# ============================================================================
# Cop-vs-Thief — single source of truth for all game parameters.
# No value used by the engine is hard-coded; everything lives here (assignment §10).
# Values map 1:1 to SHARED_MATCH_RULES.md so two engines stay compatible.
# ============================================================================

game:
  grid_size: [5, 5]        # [rows, cols]; origin [0,0] top-left, addressing [row, col]
  max_moves: 25            # max THIEF moves per sub-game (thief wins on surviving the 25th)
  num_games: 6             # sub-games in a full series
  max_barriers: 5          # barriers the cop may place per sub-game
  movement_directions: 8   # 8 = include diagonals (king moves); 4 = orthogonal only

scoring:
  cop_win: 20              # cop score on a successful capture
  thief_win: 10            # thief score on a successful escape
  cop_loss: 5              # cop score when the thief escapes
  thief_loss: 5            # thief score when the thief is captured

observation:
  vision_radius: 2         # Chebyshev (king-move) radius; opponent/barriers seen within it
  start_outside_vision: true   # place start cells beyond each other's vision radius

# Heuristic-agent tuning (offline demo policy; strategy quality is not graded, §3).
# All weights are read here — nothing is hard-coded in the policy logic.
strategy:
  # Thief — how each candidate escape cell is scored.
  thief_escape_weight: 3.0            # reward barrier-aware shortest-path distance from the cop
  thief_future_mobility_weight: 1.0   # reward cells with more exits (avoid dead-ends)
  thief_corner_penalty: 1.5           # punish hugging walls/corners while the cop is near
  thief_lookahead_weight: 2.0         # reward safety after the cop's best single reply
  thief_memory_decay: 6               # turns before a last-seen cop is forgotten (memory decay)
  thief_random_tie_break: 0.12        # break only near-ties randomly (0 = fully deterministic)
  # Cop — when a barrier is worth a turn instead of chasing. On the small 5x5 board
  # a competent pursuer would otherwise catch the thief almost every game, so the cop
  # uses tactical barriers (always on one of the thief's own escape cells, value-gated)
  # to herd it — which is also what gives the thief a believable chance to escape.
  cop_barrier_min_value: 1.0          # min simulated tactical value before placing a barrier
  cop_barrier_max_probability: 0.7    # cap on how often a *useful* barrier is taken (anti-spam)
  cop_barrier_min_gap: 2              # only consider a barrier when the visible thief is >= this far

referee:
  # Single authoritative state owner. For internal games this engine is always referee.
  # In the bonus match the cop's team engine is referee (SHARED_MATCH_RULES.md §2.1).
  owner: cop

turn:
  timeout_seconds: 30      # per-turn budget (SHARED_MATCH_RULES.md §2.5)
  reprompt_on_timeout: true  # one re-prompt, then concede the sub-game

# Local MCP server bind + client-connection. The orchestrator (MCP client) drives
# the game through these two servers over HTTP. For the cloud stage, point the URLs
# at the public HTTPS tunnels instead — only the scheme/host change. (The URLs that
# go INTO the §9.1 report live under `team.*`, not here.)
# Env overrides: COP_SERVER_HOST/COP_SERVER_PORT, THIEF_SERVER_HOST/THIEF_SERVER_PORT,
# and COP_MCP_URL / THIEF_MCP_URL (full URL override, e.g. the cloud HTTPS endpoint).
mcp:
  path: "/mcp"             # FastMCP streamable-HTTP mount path
  cop:
    host: "127.0.0.1"
    port: 8101
  thief:
    host: "127.0.0.1"
    port: 8102

match:
  seed: 42                 # shared RNG seed for reproducible start positions (set per match)
  rate_limit_per_min: 30   # cap outbound calls per direction (SHARED_MATCH_RULES.md §3)
  max_retries: 3           # transient-error retries before declaring a Technical Loss

llm:
  provider: heuristic      # "anthropic" = cloud API; "heuristic" = offline deterministic
  model: claude-opus-4-8   # cheaper option for this short-token workload: claude-haiku-4-5
  temperature: 0.7         # only sent to models that accept sampling (Haiku/Sonnet, not Opus 4.7+)
  max_tokens: 400

# Team identity & endpoints — these values go verbatim into the §9.1 report.
# Kept out of code; URLs/tokens via .env. The MCP URLs stay placeholders until
# the (deferred) cloud stage.
